name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build and Test Daml Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install DPM
        run: curl https://get.digitalasset.com/install/install.sh | sh

      - name: Add DPM to PATH
        run: echo "$HOME/.dpm/bin" >> $GITHUB_PATH

      - name: Cache DPM packages
        uses: actions/cache@v4
        with:
          path: ~/.dpm/packages
          key: ${{ runner.os }}-dpm-${{ hashFiles('**/daml.yaml', '**/multi-package.yaml') }}
          restore-keys: |
            ${{ runner.os }}-dpm-

      - name: Build all Daml packages
        # Assumes a multi-package.yaml file at the root of the repository
        run: dpm build --all

      - name: Run multi-domain integration tests
        # This step starts a multi-domain Canton network as a background process,
        # runs a Daml Script that orchestrates tests across domains,
        # and then shuts down the network.
        run: |
          # Start the multi-domain Canton network defined in the specified config file.
          # The '&' runs it in the background. We capture its process ID (PID) for cleanup.
          echo "Starting multi-domain Canton sandbox..."
          dpm sandbox --config canton-config/bridge.canton &
          CANTON_PID=$!
          echo "Canton sandbox started with PID $CANTON_PID"

          # Wait for the Canton network to fully initialize.
          # For a simple two-domain setup, 45-60 seconds is usually sufficient.
          # A more robust implementation might poll the participant health endpoints.
          echo "Waiting for Canton network to initialize..."
          sleep 45

          # Run the Daml Script test case.
          # We target the test DAR file generated by the 'dpm build' step.
          # The '--all-participants' flag tells the script runner to connect to every
          # participant defined in the canton-config/bridge.canton file, enabling
          # multi-domain testing from a single script.
          # The script name 'Bridge.Tests.MultiDomain:runIntegrationTests' is assumed to exist.
          echo "Running multi-domain Daml Script tests..."
          dpm damlc script \
            --all-participants canton-config/bridge.canton \
            --dar .daml/dist/tests-*.dar \
            --script-name Bridge.Tests.MultiDomain:runIntegrationTests

          # Terminate the background Canton process now that tests are complete.
          echo "Stopping Canton sandbox..."
          kill $CANTON_PID
          wait $CANTON_PID || echo "Canton process exited as expected."