name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  daml-ci:
    name: Build and Test Daml Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install DPM
        run: curl https://get.digitalasset.com/install/install.sh | sh

      - name: Add DPM to PATH
        run: echo "$HOME/.dpm/bin" >> $GITHUB_PATH

      - name: Display DPM version
        run: dpm --version

      - name: Build Daml Models
        run: dpm build --all

      - name: Make multi-domain setup script executable
        run: chmod +x ./scripts/setup-domains.sh

      # This script is responsible for the entire test lifecycle:
      # 1. Starting two Canton participant nodes in the background.
      # 2. Waiting for the nodes to become healthy.
      # 3. Running the Daml Script tests which connect to both nodes.
      # 4. Tearing down the Canton nodes.
      # 5. Exiting with a success (0) or failure (non-zero) code.
      - name: Run Multi-Domain Bridge Tests
        run: ./scripts/setup-domains.sh
        env:
          # Use a non-interactive mode for CI environments if the script supports it
          CI: true